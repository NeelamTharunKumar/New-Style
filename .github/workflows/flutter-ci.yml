name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Prepare platforms
        run: ./scripts/prepare_flutter_platforms.sh
      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze
      - name: Run Flutter tests
        working-directory: flutter_app
        run: flutter test
      - name: Build debug APK smoke test
        working-directory: flutter_app
        run: flutter build apk --debug --dart-define=DRAPE_API_BASE_URL=http://10.0.2.2:8000
