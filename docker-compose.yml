services:
  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DRAPE_ENV: ${DRAPE_ENV:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drape}
      POSTGRES_DB: ${POSTGRES_DB:-drape}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drape -d drape"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
