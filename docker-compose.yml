services:
  api:
    build:
      context: ./backend
    environment:
      DRAPE_ENV: production
      DRAPE_API_KEY: change-me
      DRAPE_CORS_ORIGINS: http://localhost:3000,http://localhost:8080
      DATABASE_URL: postgresql+psycopg://drape:drape@postgres:5432/drape
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drape
      POSTGRES_PASSWORD: drape
      POSTGRES_DB: drape
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drape -d drape"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
